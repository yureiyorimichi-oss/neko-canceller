<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>😺 ニャーニャー・キャンセラー</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #000; color: #fff; height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #app-container { width: 100%; max-width: 400px; padding: 20px; display: grid; gap: 20px; }
        
        /* イラストエリア */
        #illustration-frame { border: 2px solid #fff; border-radius: 10px; min-height: 250px; position: relative; overflow: hidden; }
        .illust-layer { width: 100%; height: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        #status-area { height: 1.5em; font-size: 1.1em; color: #fff; }

        /* コントロールエリア */
        #controls { display: flex; justify-content: space-around; align-items: center; }
        
        #adjuster-grid { display: flex; gap: 15px; }
        .adjust-column { display: flex; flex-direction: column; align-items: center; position: relative; }
        .label { font-size: 0.7em; position: absolute; top: -15px; white-space: nowrap; }
        .arrow-icon { width: 30px; cursor: pointer; }
        .arrow-down { transform: rotate(180deg); }
        .value-display { font-size: 1.1em; font-weight: bold; margin: 2px 0; }
        
        /* 変換ボタン：画像サイズを固定 */
        #startBtn { border: none; background: none; cursor: pointer; padding: 0; z-index: 10; transition: transform 0.1s; width: 100px; height: 100px; }
        #startBtn:active { transform: scale(0.95); }
        #btn-img { width: 100%; height: 100%; border-radius: 50%; display: block; object-fit: contain; }

        /* 下部モード選択 */
        #sub-text-area { display: flex; justify-content: center; gap: 30px; margin-top: 10px; }
        .sub-text { cursor: pointer; position: relative; padding-bottom: 5px; color: #888; font-size: 0.9em; z-index: 10; }
        .sub-text.active { color: #fff; font-weight: bold; }
        
        .sub-text.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <div id="app-container">
        <div id="illustration-frame">
            <div id="group-before">
                <img src="集音うるさい.png" class="illust-layer">
                <img src="顔うるさい.png" class="illust-layer">
            </div>
            <div id="group-after" style="display: none;">
                <img src="集音ねこ.png" class="illust-layer">
                <img src="顔よろこび.png" class="illust-layer">
            </div>
        </div>

        <div id="status-area"></div>

        <div id="controls">
            <div id="adjuster-grid">
                <div class="adjust-column">
                    <span class="label">ゲイン</span>
                    <img src="矢印.png" class="arrow-icon" id="gainUp">
                    <span id="gain-value" class="value-display">10</span>
                    <img src="矢印.png" class="arrow-icon arrow-down" id="gainDown">
                </div>
                <div class="adjust-column">
                    <span class="label">感度</span>
                    <img src="矢印.png" class="arrow-icon" id="threshUp">
                    <span id="thresh-value" class="value-display">30</span>
                    <img src="矢印.png" class="arrow-icon arrow-down" id="threshDown">
                </div>
            </div>
            
            <button id="startBtn">
                <img src="へんかんボタン.png" id="btn-img">
            </button>
        </div>

        <div id="sub-text-area">
            <span class="sub-text" id="mode-nami">なみ</span>
            <span class="sub-text active" id="mode-neko">ねこ</span>
            <span class="sub-text" id="mode-takibi">たきび</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
