<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ネコ語コンバーター</title>
    <style>
        html, body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            position: fixed;
            -webkit-text-size-adjust: 100%;
        }

        #app-container {
            width: 100%;
            height: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
            box-sizing: border-box;
            padding-bottom: calc(50px + env(safe-area-inset-bottom));
        }

        header {
            width: 100%;
            height: 12%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 2dvh;
            flex-shrink: 0;
        }

        .logo-img {
            width: 50%;
            min-width: 130px; 
            max-width: 200px;
            height: auto;
        }

        .spacer-flexible {
            flex-grow: 1;
            max-height: 80px;
            min-height: 10px;
            width: 100%;
        }

        /* イラストエリア */
        #visual-section {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .illust-layer {
            width: min(280px, 65vw);
            height: auto;
            object-fit: contain;
        }

        /* エフェクトエリア（イラストの下、集音中の上） */
        #effects-section {
            width: 100%;
            height: 100px; /* 隙間を広げたため少し高さを確保 */
            position: relative;
            margin: 10px 0;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .assets-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none; 
            justify-content: center; /* 中央寄せ */
            align-items: center;
            gap: 20px; /* 左右画像とアニメーションの間の距離 */
        }

        /* 左右の静止画 */
        .extra-layer {
            width: 55px;
            height: auto;
            object-fit: contain;
        }

        /* 中央のアニメーションエリア */
        .teleport-container {
            display: flex;
            gap: 100px; /* 指示通りアニメーションの間に100pxの隙間を配置 */
            justify-content: center;
            align-items: center;
        }

        .teleport-box {
            width: 45px;
            height: 45px;
        }

        .inner-img {
            width: 100%;
            height: auto;
        }

        /* アニメーション設定 */
        @keyframes randomRight { 0%, 25% { transform: translate(5px, 5px); } 26%, 50% { transform: translate(10px, -8px); } 51%, 75% { transform: translate(-4px, 12px); } 76%, 100% { transform: translate(8px, -4px); } }
        @keyframes randomLeft { 0%, 30% { transform: translate(-8px, -4px); } 31%, 60% { transform: translate(4px, 8px); } 61%, 85% { transform: translate(-12px, 4px); } 86%, 100% { transform: translate(0px, -8px); } }
        .anim-right { animation: randomRight 5.2s step-end infinite; } .anim-left { animation: randomLeft 6.4s step-end infinite; }

        /* 下部UIエリア */
        #bottom-ui {
            width: 100%;
            margin-top: auto; 
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-text {
            margin-bottom: 15px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            letter-spacing: 0.15em;
            font-weight: bold;
        }

        #controls-panel {
            width: 100%;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 25px;
        }

        #main-action-btn { 
            width: 90px; 
            height: 90px; 
            background-color: #fff; 
            border-radius: 50%; 
            border: none; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        #main-action-btn img { width: 75%; height: auto; }

        .param-control { display: flex; flex-direction: column; align-items: center; width: 50px; }
        .arrow-btn { color: #fff; font-size: 24px; background: none; border: none; cursor: pointer; }
        .param-label { font-size: 9px; }
        .param-value { font-size: 20px; font-weight: bold; }

        #mode-nav { display: flex; justify-content: center; gap: 30px; width: 100%; }
        .mode-item { opacity: 0.4; font-size: 16px; font-weight: bold; cursor: pointer; }
        .mode-item.active { opacity: 1; border-bottom: 2px solid #fff; }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <img src="img/neko-canceller_01.png" alt="ロゴ" class="logo-img" onclick="location.reload()">
    </header>

    <div class="spacer-flexible"></div>

    <div id="visual-section">
        <img src="img/neko-canceller_04.png" id="base-layer" class="illust-layer">
    </div>

    <div id="effects-section">
        <div id="wrapper-normal" class="assets-wrapper" style="display: flex;">
            <img src="img/neko-canceller_06.png" class="extra-layer">
            <div class="teleport-container">
                <div class="teleport-box"><img src="img/neko-canceller_08.png" class="inner-img anim-right"></div>
                <div class="teleport-box"><img src="img/neko-canceller_09.png" class="inner-img anim-left"></div>
            </div>
            <img src="img/neko-canceller_07.png" class="extra-layer">
        </div>
        
        <div id="wrapper-neko" class="assets-wrapper">
            <img src="img/neko-canceller_10.png" class="extra-layer">
            <div class="teleport-container">
                <div class="teleport-box"><img src="img/neko-canceller_12.png" class="inner-img anim-right"></div>
                <div class="teleport-box"><img src="img/neko-canceller_13.png" class="inner-img anim-left"></div>
            </div>
            <img src="img/neko-canceller_11.png" class="extra-layer">
        </div>
        
        <div id="wrapper-nami" class="assets-wrapper">
            <img src="img/neko-canceller_14.png" class="extra-layer">
            <div class="teleport-container">
                <div class="teleport-box"><img src="img/neko-canceller_16.png" class="inner-img anim-right"></div>
                <div class="teleport-box"><img src="img/neko-canceller_17.png" class="inner-img anim-left"></div>
            </div>
            <img src="img/neko-canceller_15.png" class="extra-layer">
        </div>
        
        <div id="wrapper-takibi" class="assets-wrapper">
            <img src="img/neko-canceller_18.png" class="extra-layer">
            <div class="teleport-container">
                <div class="teleport-box"><img src="img/neko-canceller_20.png" class="inner-img anim-right"></div>
                <div class="teleport-box"><img src="img/neko-canceller_21.png" class="inner-img anim-left"></div>
            </div>
            <img src="img/neko-canceller_19.png" class="extra-layer">
        </div>
    </div>

    <div id="bottom-ui">
        <p class="status-text" id="status-label">集音中〜</p>
        <div id="controls-panel">
            <div class="param-control">
                <button class="arrow-btn" onclick="adjust('gain', 1)">↑</button>
                <div class="param-label">集音力</div>
                <div class="param-value" id="gain-val">1</div>
                <button class="arrow-btn" onclick="adjust('gain', -1)">↓</button>
            </div>
            <button id="main-action-btn"><img src="img/neko-canceller_29.png" id="btn-icon"></button>
            <div class="param-control">
                <button class="arrow-btn" onclick="adjust('threshold', 1)">↑</button>
                <div class="param-label">音判定</div>
                <div class="param-value" id="threshold-val">5</div>
                <button class="arrow-btn" onclick="adjust('threshold', -1)">↓</button>
            </div>
        </div>
        <nav id="mode-nav">
            <span class="mode-item" data-mode="なみ" onclick="selectMode(this)">なみ</span>
            <span class="mode-item active" data-mode="ねこ" onclick="selectMode(this)">ねこ</span>
            <span class="mode-item" data-mode="たきび" onclick="selectMode(this)">たきび</span>
        </nav>
    </div>
</div>

<script>
    let isConverting = false;
    let currentMode = "ねこ";
    let audioCtx, analyser, dataArray, masterGain;
    let audioBuffers = {};
    let isTidying = false;
    let ignoreMicUntil = 0;

    const mainBtn = document.getElementById('main-action-btn');
    const btnIcon = document.getElementById('btn-icon');
    const baseLayer = document.getElementById('base-layer');
    const statusLabel = document.getElementById('status-label');
    const wrappers = { "normal": document.getElementById('wrapper-normal'), "ねこ": document.getElementById('wrapper-neko'), "なみ": document.getElementById('wrapper-nami'), "たきび": document.getElementById('wrapper-takibi') };

    async function preloadFiles() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const files = { "ねこ": "meow.mp3", "なみ": "nami.mp3", "たきび": "takibi.mp3" };
        for (const [key, url] of Object.entries(files)) {
            try {
                const res = await fetch(url);
                const buf = await res.arrayBuffer();
                audioBuffers[key] = await audioCtx.decodeAudioData(buf);
            } catch (e) { console.error(`${key} loading failed:`, e); }
        }
    }

    async function initMicrophone() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            masterGain = audioCtx.createGain();
            source.connect(analyser);
            masterGain.connect(audioCtx.destination);
            analyser.fftSize = 512;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            detectSound();
        } catch (e) { alert("マイクの使用を許可してください。"); }
    }

    function detectSound() {
        if (!analyser) return;
        analyser.getByteFrequencyData(dataArray);
        let sumSquares = 0;
        for (let i = 0; i < dataArray.length; i++) { sumSquares += dataArray[i] * dataArray[i]; }
        let volume = Math.sqrt(sumSquares / dataArray.length);
        const userThreshold = parseInt(document.getElementById('threshold-val').innerText);
        const threshold = userThreshold * 4 + 15; 
        const now = Date.now();
        if (isConverting && now > ignoreMicUntil && volume > threshold && !isTidying) { triggerEffect(); }
        requestAnimationFrame(detectSound);
    }

    function triggerEffect() {
        const buffer = audioBuffers[currentMode];
        if (!buffer || isTidying || !isConverting) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        isTidying = true;
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        const localGain = audioCtx.createGain();
        const userVolume = parseInt(document.getElementById('gain-val').innerText);
        localGain.gain.setValueAtTime(userVolume, audioCtx.currentTime);
        source.connect(localGain);
        localGain.connect(masterGain);

        if (currentMode === "ねこ") {
            source.playbackRate.value = 0.8 + Math.random() * 0.7;
            source.start(0);
            setTimeout(() => { isTidying = false; }, 300);
        } else if (currentMode === "なみ") {
            const duration = 5 + Math.random() * 3;
            const offset = Math.random() * Math.max(0, buffer.duration - duration);
            source.start(0, offset, duration);
            setTimeout(() => { isTidying = false; }, 1500); 
        } else if (currentMode === "たきび") {
            source.start(0);
            setTimeout(() => { isTidying = false; }, 200); 
        }
        source.onended = () => { source.disconnect(); localGain.disconnect(); };
    }

    function updateVisuals() {
        Object.values(wrappers).forEach(w => w.style.display = 'none');
        if (isConverting) {
            baseLayer.src = 'img/neko-canceller_03.png';
            btnIcon.src = 'img/neko-canceller_30.png';
            statusLabel.innerText = currentMode + '変換中！';
            mainBtn.style.backgroundColor = '#ffdb4d';
            wrappers[currentMode].style.display = 'flex';
            if (masterGain) masterGain.gain.setTargetAtTime(1, audioCtx.currentTime, 0.01);
        } else {
            if (masterGain) masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.01);
            baseLayer.src = 'img/neko-canceller_04.png';
            btnIcon.src = 'img/neko-canceller_29.png';
            statusLabel.innerText = '集音中〜';
            mainBtn.style.backgroundColor = '#fff';
            wrappers["normal"].style.display = 'flex';
        }
    }

    mainBtn.addEventListener('click', async () => {
        if (!audioCtx) await preloadFiles();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        if (!analyser) await initMicrophone();
        isConverting = !isConverting;
        ignoreMicUntil = Date.now() + 800; 
        isTidying = false; 
        updateVisuals();
    });

    function selectMode(element) {
        document.querySelectorAll('.mode-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');
        currentMode = element.getAttribute('data-mode');
        if (isConverting) { ignoreMicUntil = Date.now() + 500; updateVisuals(); }
    }

    function adjust(type, amount) {
        const target = document.getElementById(type + '-val');
        let val = parseInt(target.innerText);
        val = Math.max(1, Math.min(20, val + amount));
        target.innerText = val;
    }
</script>
</body>
</html>
